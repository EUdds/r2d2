name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dome-motor:
    name: Dome motor (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libgpiod
        run: sudo apt-get install -y libgpiod-dev

      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build dome_motor
        run: bazel build //dome_motor/...

  firmware:
    name: Firmware (RP2040)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: bazel-contrib/setup-bazel@0.9.1
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build firmware
        run: bazel build //firmware/... --platforms=@pico-sdk//bazel/platform:rp2040
